<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trace preview — driven by live main.js</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <style>
      /* Preview-only chrome — the trace itself uses live styles.css. */
      .preview-controls {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 10px 20px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
      }
      .preview-controls button {
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
      }
      .preview-controls button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }
      .preview-controls button:hover { filter: brightness(1.05); }
      .preview-note {
        font-size: 11px;
        color: var(--muted);
        font-style: italic;
        margin-left: auto;
      }
      .preview-status { font-size: 12px; color: var(--muted); }

      /* Mimic the run-panel scroll container so autoscroll behavior
         matches what the live app does. */
      .run-panel {
        display: flex !important;
        flex-direction: column;
        height: calc(100vh - 100px);
        overflow-y: auto;
        background: var(--panel);
      }
    </style>
  </head>
  <body class="has-persona">
    <header class="app-header">
      <h1>
        <span>Trace preview</span>
        <span class="muted">— driven by the live main.js renderers</span>
      </h1>
    </header>

    <section class="run-panel">
      <!-- Filter dropdown — main.js's buildFilterBar populates #filter-toggles. -->
      <div class="action-bar" id="action-bar">
        <span class="preview-status" id="preview-status">ready</span>
        <div class="filter-dropdown" id="filter-dropdown" style="margin-left: auto;">
          <button class="filter-trigger" id="filter-trigger" type="button" aria-haspopup="true" aria-expanded="false">
            <svg class="filter-icon" viewBox="0 0 16 16" aria-hidden="true">
              <path fill="currentColor" d="M2 3h12l-4.5 6v4l-3 1V9z"/>
            </svg>
            <span class="filter-trigger-label">Filter output</span>
            <span class="filter-count" id="filter-count">12</span>
            <svg class="filter-chevron" viewBox="0 0 12 12" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="1.5" d="M3 4.5l3 3 3-3"/>
            </svg>
          </button>
          <div class="filter-popover" id="filter-popover" hidden>
            <div class="filter-popover-header">
              <span class="filter-popover-title">Show agents</span>
              <div class="filter-popover-actions">
                <button class="filter-link" id="filter-all" type="button">All</button>
                <button class="filter-link" id="filter-none" type="button">None</button>
              </div>
            </div>
            <div class="filter-popover-body" id="filter-toggles"></div>
          </div>
        </div>
      </div>

      <div class="preview-controls">
        <button id="play-btn" class="primary" type="button">▶ Replay events</button>
        <button id="reset-btn" type="button">Reset</button>
        <span class="preview-note">All events flow through the same routeTraceEvent() the live SSE stream uses.</span>
      </div>

      <!-- main.js writes stage cards into here. -->
      <div id="trace-stages" class="trace-stages" hidden></div>
    </section>

    <script type="module">
      import {
        initStages,
        finalizeStages,
        routeTraceEvent,
        renderFinalStage,
        buildFilterBar,
      } from "./main.js";

      // Build the filter bar (live function — no duplication).
      buildFilterBar();

      // Synthetic SSE-shaped events. Each maps onto a real backend
      // TraceEventType, so the live router buckets them into the
      // correct stage exactly the way it would for a real run.
      const fixture = [
        // --- Stage 1: Agent execution ---
        { type: "orchestrator_started", sub_agent: "orchestrator",
          payload: { persona: "amelia", date: "2026-05-03", agents: 9 } },
        { type: "subagent_started", sub_agent: "shopping", payload: {} },
        { type: "subagent_started", sub_agent: "travel",   payload: {} },
        { type: "subagent_started", sub_agent: "calendar", payload: {} },
        { type: "subagent_started", sub_agent: "finance",  payload: {} },
        { type: "subagent_started", sub_agent: "email_triage", payload: {} },
        { type: "subagent_started", sub_agent: "food",     payload: {} },
        { type: "subagent_started", sub_agent: "dates",    payload: {} },
        { type: "subagent_started", sub_agent: "events",   payload: {} },
        { type: "subagent_started", sub_agent: "todos",    payload: {} },

        { type: "tool_call", sub_agent: "shopping",
          payload: { tool: "gmail_search", input: { query: "from:on-running.com after:2026-04-01", max: 20 } } },
        { type: "tool_result", sub_agent: "shopping",
          payload: { tool: "gmail_search", result_count: 3, preview: [
            { title: "Strava: shoe mileage update", url: null },
            { title: "On Running: Cloudmonster 2 launch", url: null },
            { title: "REI: receipt — On Cloudmonsters US10", url: null },
          ]}},
        { type: "tool_call", sub_agent: "shopping",
          payload: { tool: "web_search", input: { query: "On Cloudmonster 2 review 2026" } } },
        { type: "tool_result", sub_agent: "shopping",
          payload: { tool: "web_search", result_count: 8, preview: [
            { title: "On Cloudmonster 2 — Believe in the Run", url: "believeintherun.com/on-cloudmonster-2" },
            { title: "Cloudmonster 2 vs Clifton 9", url: "roadtrailrun.com/cmst2-vs-clifton" },
          ]}},
        { type: "llm_call", sub_agent: "shopping",
          payload: { model: "claude-opus-4-7", tokens: { input_tokens: 8214, output_tokens: 412, cache_read_input_tokens: 6800 } } },
        { type: "subagent_returned", sub_agent: "shopping",
          payload: {
            tasks: [
              { title: "Replace On Cloudmonsters — current pair at 580mi",
                action: "queue replacement order for On Cloudmonster 2, US 10, same colorway",
                rationale: "Strava shoe-mileage 580mi; user typically swaps ~500mi",
                suggested_surface_time: "2026-05-03T18:00",
                sub_agent: "shopping" },
            ],
            preference_updates: [
              { section: "Shopping",
                content: "prefers On running shoes (Cloudmonster line); replaces ~every 500mi; size US 10",
                reason: "consistent purchase history + REI receipt for sizing" },
            ]
          }},

        { type: "tool_call",   sub_agent: "travel", payload: { tool: "calendar_query", input: { range: "2026-05-03..2026-05-17" } } },
        { type: "tool_result", sub_agent: "travel", payload: { tool: "calendar_query", result_count: 4 } },
        { type: "subagent_returned", sub_agent: "travel",
          payload: { tasks: [
            { title: "Check in for SFO→JFK flight — opens 24h prior",
              action: "remind 30min before check-in window opens; surface seat-map link",
              rationale: "UA1234 dep 2026-05-05 18:25; seat 14C unselected",
              suggested_surface_time: "2026-05-04T17:55",
              sub_agent: "travel" }
          ], preference_updates: [] }},

        { type: "subagent_returned", sub_agent: "calendar",
          payload: { tasks: [
            { title: "Move dentist appt — conflicts with standup",
              action: "propose 4 alternative slots from open windows",
              rationale: "9:00 dentist overlaps recurring 9:00 standup tomorrow",
              suggested_surface_time: "2026-05-03T08:30",
              sub_agent: "calendar" }
          ], preference_updates: [] }},

        { type: "subagent_returned", sub_agent: "finance",
          payload: { tasks: [
            { title: "Amex Platinum bill $1,247 due Fri — autopay off",
              action: "remind to pay or enable autopay; flag $312 dining as 2x usual",
              rationale: "due 2026-05-08; $312 Atelier Crenn is 2x median",
              suggested_surface_time: "2026-05-03T09:00",
              sub_agent: "finance" }
          ], preference_updates: [] }},

        { type: "subagent_returned", sub_agent: "email_triage",
          payload: { tasks: [
            { title: "Reply to Mom's check-in", action: "draft a short reply",
              rationale: "mom emailed yesterday", suggested_surface_time: "2026-05-03T11:00",
              sub_agent: "email_triage" },
            { title: "Respond to landlord — lease renewal Q",
              action: "draft a holding reply asking for terms in writing",
              rationale: "landlord asked for verbal commit", suggested_surface_time: "2026-05-03T11:00",
              sub_agent: "email_triage" }
          ], preference_updates: [] }},

        { type: "subagent_returned", sub_agent: "food",
          payload: { tasks: [], preference_updates: [
            { section: "Food",
              content: "vegetarian-leaning at home; eats meat when out",
              reason: "Trader Joe's order pattern + Resy reservation history" }
          ]}},

        { type: "subagent_returned", sub_agent: "dates",
          payload: { tasks: [], preference_updates: [], note: "no romantic-context signals today" }},

        { type: "subagent_returned", sub_agent: "events",
          payload: { tasks: [
            { title: "Anuv Jain — Singapore — Ticketmaster SG",
              action: "set reminder 09:55 Fri; pre-fill 2 GA tickets",
              rationale: "user follows artist; presale opens Fri 10am",
              suggested_surface_time: "2026-05-09T09:55",
              sub_agent: "events" }
          ], preference_updates: [] }},

        { type: "subagent_returned", sub_agent: "todos",
          payload: { tasks: [
            { title: "Send Q2 product spec doc to leadership",
              action: "draft and send the doc",
              rationale: "self-committed to 'this Friday' in Slack",
              suggested_surface_time: "2026-05-03T15:00",
              sub_agent: "todos" },
            { title: "Send Mira birthday photo album to Priya",
              action: "compile and send the album",
              rationale: "promised Priya last week",
              suggested_surface_time: "2026-05-03T19:00",
              sub_agent: "todos" }
          ], preference_updates: [] }},

        // --- Stage 2: Preference updates (orchestrator merges) ---
        { type: "preference_merged", sub_agent: "orchestrator",
          payload: { section: "Shopping",
            content: "prefers On running shoes (Cloudmonster line); replaces ~every 500mi; size US 10",
            reason: "consistent purchase history + REI receipt for sizing" }},
        { type: "preference_merged", sub_agent: "orchestrator",
          payload: { section: "Food",
            content: "vegetarian-leaning at home; eats meat when out",
            reason: "Trader Joe's order pattern + Resy reservation history" }},

        // --- Stage 3: Rubric scoring + filter ---
        // task_emitted = passed; task_filtered = dropped. Both carry the
        // same 7-criteria array so the hit/miss pill row renders.
        rubric("task_emitted",  "calendar", "Move dentist appt — conflicts with standup", 5,
          ["time_sensitive","concrete_action","high_stakes_if_missed","non_redundant","well_justified_surface_time"]),
        rubric("task_emitted",  "finance",  "Amex Platinum bill $1,247 due Fri — autopay off", 6,
          ["time_sensitive","concrete_action","high_stakes_if_missed","non_redundant","matches_stated_preference","well_justified_surface_time"]),
        rubric("task_emitted",  "shopping", "Replace On Cloudmonsters — current pair at 580mi", 4,
          ["recurring_pattern_match","concrete_action","non_redundant","matches_stated_preference"]),
        rubric("task_filtered", "email_triage", "Reply to Mom's check-in", 2,
          ["concrete_action","non_redundant"], "below cutoff"),
        rubric("task_filtered", "shopping", "Buy Theragun Mini on Amazon.in", 3,
          ["recurring_pattern_match","matches_stated_preference","non_redundant"], "below cutoff"),
        rubric("task_emitted",  "todos", "Send Q2 product spec doc to leadership", 5,
          ["time_sensitive","concrete_action","high_stakes_if_missed","non_redundant","well_justified_surface_time"]),
        rubric("task_emitted",  "todos", "Send Mira birthday photo album to Priya", 4,
          ["time_sensitive","concrete_action","non_redundant","matches_stated_preference"]),
        rubric("task_filtered", "events", "Anuv Jain — Singapore — Ticketmaster SG", 3,
          ["time_sensitive","concrete_action","matches_stated_preference"], "capped (per-agent max already filled)"),
        rubric("task_emitted",  "travel", "Check in for SFO→JFK flight — opens 24h prior", 4,
          ["time_sensitive","concrete_action","non_redundant","well_justified_surface_time"]),

        // --- Stage 4: LLM reframing ---
        reframe("calendar", "Move dentist appt — conflicts with standup",
          "propose 4 alternative slots from open windows",
          "Your dentist appt tomorrow at 9am clashes with standup. I lined up 4 open slots later this week — pick one?",
          "2026-05-03T08:30"),
        reframe("finance", "Amex Platinum bill $1,247 due Fri — autopay off",
          "remind to pay or enable autopay; flag $312 dining as 2x usual",
          "Amex bill ($1,247) due Friday — autopay isn't on. One unusual charge: $312 at Atelier Crenn vs your usual ~$150.",
          "2026-05-03T09:00"),
        reframe("shopping", "Replace On Cloudmonsters — current pair at 580mi",
          "queue replacement order for On Cloudmonster 2, US 10, same colorway",
          "Your Cloudmonsters are at 580mi (you usually swap at 500). Want me to queue the Cloudmonster 2 in your usual size?",
          "2026-05-03T18:00"),
        reframe("travel", "Check in for SFO→JFK flight — opens 24h prior",
          "remind 30min before check-in window opens; surface seat-map link",
          "SFO→JFK check-in opens at 6:25pm tomorrow. I'll ping you 30min before with the seat map.",
          "2026-05-04T17:55"),
        reframe("todos", "Send Q2 product spec doc to leadership",
          "draft and send the doc",
          "Your Q2 spec doc is committed for Friday. Want me to surface the draft so you can ship it before EOD?",
          "2026-05-03T15:00"),
        reframe("todos", "Send Mira birthday photo album to Priya",
          "compile and send the album",
          "You promised Priya the Mira birthday photos last week — want me to compile and send the album?",
          "2026-05-03T19:00"),
      ];

      // Synthetic 'result' frame for stage 5.
      const synthResult = {
        final_messages: [
          { message: "Your dentist appt tomorrow at 9am clashes with standup. I lined up 4 open slots later this week — pick one?",
            surface_time: "2026-05-03T08:30",
            scored_task: { total_score: 5, task: { sub_agent: "calendar" } } },
          { message: "Amex bill ($1,247) due Friday — autopay isn't on. One unusual charge: $312 at Atelier Crenn vs your usual ~$150.",
            surface_time: "2026-05-03T09:00",
            scored_task: { total_score: 6, task: { sub_agent: "finance" } } },
          { message: "Your Cloudmonsters are at 580mi (you usually swap at 500). Want me to queue the Cloudmonster 2 in your usual size?",
            surface_time: "2026-05-03T18:00",
            scored_task: { total_score: 4, task: { sub_agent: "shopping" } } },
          { message: "SFO→JFK check-in opens at 6:25pm tomorrow. I'll ping you 30min before with the seat map.",
            surface_time: "2026-05-04T17:55",
            scored_task: { total_score: 4, task: { sub_agent: "travel" } } },
          { message: "Your Q2 spec doc is committed for Friday. Want me to surface the draft so you can ship it before EOD?",
            surface_time: "2026-05-03T15:00",
            scored_task: { total_score: 5, task: { sub_agent: "todos" } } },
        ],
      };

      // Helpers — keep the fixture above readable.
      const ALL_CRITERIA = [
        "time_sensitive", "recurring_pattern_match", "concrete_action",
        "high_stakes_if_missed", "non_redundant", "matches_stated_preference",
        "well_justified_surface_time"
      ];
      function rubric(type, agent, title, score, hits, reason) {
        return {
          type, sub_agent: type === "task_emitted" ? agent : "orchestrator",
          payload: {
            title, action: `(action for "${title}")`, score, agent,
            ...(reason ? { reason } : {}),
            criteria: ALL_CRITERIA.map((name) => ({
              name, matches: hits.includes(name),
              reasoning: hits.includes(name) ? "matched" : "no signal",
            })),
          },
        };
      }
      function reframe(agent, title, action, message, surface_time) {
        return {
          type: "message_drafted", sub_agent: "messenger",
          payload: { title, action, agent, message, surface_time },
        };
      }

      // Replay loop — feeds each event through the live router with a
      // small delay so the streaming + autoscroll behavior is testable.
      const status = document.getElementById("preview-status");
      const playBtn = document.getElementById("play-btn");
      const resetBtn = document.getElementById("reset-btn");
      let replaying = false;

      async function replay() {
        if (replaying) return;
        replaying = true;
        playBtn.disabled = true;
        initStages();
        const t0 = performance.now();
        for (let i = 0; i < fixture.length; i++) {
          routeTraceEvent(fixture[i], t0);
          status.textContent = `streaming ${i + 1}/${fixture.length}`;
          await sleep(80);
        }
        renderFinalStage(synthResult);
        finalizeStages();
        status.textContent = `done — ${fixture.length} events`;
        replaying = false;
        playBtn.disabled = false;
      }

      function reset() {
        initStages();
        finalizeStages();
        status.textContent = "ready";
      }

      function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

      playBtn.addEventListener("click", replay);
      resetBtn.addEventListener("click", reset);

      // Auto-play on first load so user lands on something.
      replay();
    </script>
  </body>
</html>
